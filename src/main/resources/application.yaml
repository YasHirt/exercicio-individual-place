spring:
  application:
    name: projetoTeste

  datasource:
    url: jdbc:postgresql://localhost:5432/filmes_db
    driverClassName: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  flyway:
    enabled: true
    locations: classpath:db/migration
    url: jdbc:postgresql://localhost:5432/filmes_db
    user: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8081